<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Banquet OBR — Invitation</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
  :root {
    --gold:    #C9A84C;
    --gold-lt: #E8C97A;
    --cream:   #F5ECD7;
    --ink:     #0E0C09;
    --muted:   rgba(245, 236, 215, 0.45);
  }

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0; padding: 0;
  }

  html {
    height: 100%;
    background: var(--ink);
  }

  body {
    min-height: 100vh;
    background: var(--ink);
    font-family: 'Montserrat', sans-serif;
    color: var(--cream);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 60px;
    overflow-x: hidden;
    opacity: 0;
    animation: fadeIn 1.2s ease 0.2s forwards;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* ── Grain overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.035;
    pointer-events: none;
    z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
  }

  /* ── Header sigil ── */
  .sigil {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 24px;
    position: relative;
    z-index: 1;
    animation: slideDown 1s ease 0.5s both;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .sigil-line {
    width: 1px;
    height: 36px;
    background: linear-gradient(to bottom, transparent, var(--gold));
    margin-bottom: 16px;
  }

  .sigil-icon {
    font-size: 1.6rem;
    letter-spacing: 0.2em;
    margin-bottom: 14px;
    opacity: 0.9;
  }

  .event-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(1.7rem, 7vw, 2.4rem);
    letter-spacing: 0.14em;
    text-align: center;
    color: var(--gold-lt);
    text-shadow: 0 0 40px rgba(201, 168, 76, 0.3);
    line-height: 1.15;
  }

  .event-sub {
    font-size: 0.65rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 8px;
  }

  /* ── Séparateur ── */
  .rule {
    width: min(80vw, 280px);
    height: 1px;
    position: relative;
    margin: 6px auto 0;
    z-index: 1;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.5;
  }

  /* ── Image invitation ── */
  .invitation-wrap {
    position: relative;
    z-index: 1;
    width: min(88vw, 380px);
    margin: 28px auto 0;
    animation: revealUp 1s ease 0.9s both;
  }

  @keyframes revealUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Cadre doré */
  .invitation-wrap::before {
    content: '';
    position: absolute;
    inset: -1px;
    border: 1px solid rgba(201, 168, 76, 0.35);
    border-radius: 2px;
    pointer-events: none;
    z-index: 2;
  }

  /* Coins décoratifs */
  .corner {
    position: absolute;
    width: 14px;
    height: 14px;
    border-color: var(--gold);
    border-style: solid;
    opacity: 0.7;
    z-index: 3;
  }
  .corner.tl { top: -4px; left: -4px;  border-width: 1px 0 0 1px; }
  .corner.tr { top: -4px; right: -4px; border-width: 1px 1px 0 0; }
  .corner.bl { bottom: -4px; left: -4px;  border-width: 0 0 1px 1px; }
  .corner.br { bottom: -4px; right: -4px; border-width: 0 1px 1px 0; }

  .invitation-wrap img {
    width: 100%;
    display: block;
    border-radius: 1px;
  }

  /* ── Texte discret ── */
  .caption {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(0.8rem, 3vw, 0.95rem);
    letter-spacing: 0.18em;
    color: var(--muted);
    text-align: center;
    margin-top: 16px;
    animation: revealUp 1s ease 1.2s both;
    position: relative;
    z-index: 1;
  }

  /* ── Infos événement ── */
  .event-details {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: min(88vw, 380px);
    margin: 28px auto 0;
    position: relative;
    z-index: 1;
    animation: revealUp 1s ease 1.4s both;
  }

  .detail-row {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 12px 16px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.12);
    border-radius: 2px;
  }

  .detail-icon {
    font-size: 1rem;
    opacity: 0.7;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .detail-text {
    font-size: 0.78rem;
    letter-spacing: 0.06em;
    color: var(--cream);
    opacity: 0.75;
    line-height: 1.6;
  }

  .detail-text strong {
    display: block;
    font-weight: 500;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 1;
    margin-bottom: 2px;
  }

  /* ── Bouton calendrier ── */
  .cal-wrap {
    width: min(88vw, 380px);
    margin: 24px auto 0;
    position: relative;
    z-index: 1;
    animation: revealUp 1s ease 1.6s both;
  }

  .cal-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 15px 24px;
    background: transparent;
    border: 1px solid var(--gold);
    border-radius: 2px;
    color: var(--gold-lt);
    font-family: 'Montserrat', sans-serif;
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .cal-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .cal-btn:hover::before,
  .cal-btn:active::before {
    opacity: 0.08;
  }

  .cal-btn:hover,
  .cal-btn:active {
    box-shadow: 0 0 24px rgba(201,168,76,0.2);
  }

  .cal-btn span {
    position: relative;
    z-index: 1;
  }

  .cal-icon {
    font-size: 1rem;
    position: relative;
    z-index: 1;
  }

  /* ── Bouton Facebook ── */
  .fb-wrap {
    width: min(88vw, 380px);
    margin: 10px auto 0;
    position: relative;
    z-index: 1;
    animation: revealUp 1s ease 1.75s both;
  }

  .fb-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 15px 24px;
    background: transparent;
    border: 1px solid rgba(201,168,76,0.35);
    border-radius: 2px;
    color: rgba(245, 236, 215, 0.55);
    font-family: 'Montserrat', sans-serif;
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .fb-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .fb-btn:hover::before,
  .fb-btn:active::before {
    opacity: 0.05;
  }

  .fb-btn:hover,
  .fb-btn:active {
    border-color: rgba(201,168,76,0.6);
    color: rgba(245, 236, 215, 0.8);
    box-shadow: 0 0 18px rgba(201,168,76,0.12);
  }

  .fb-btn span {
    position: relative;
    z-index: 1;
  }

  /* Icône Facebook SVG inline */
  .fb-icon {
    position: relative;
    z-index: 1;
    width: 14px;
    height: 14px;
    opacity: 0.7;
    flex-shrink: 0;
  }

  /* ── Pied de page ── */
  .footer-line {
    width: 1px;
    height: 28px;
    background: linear-gradient(to bottom, var(--gold), transparent);
    margin: 40px auto 0;
    opacity: 0.35;
    position: relative;
    z-index: 1;
    animation: revealUp 1s ease 1.95s both;
  }
</style>
</head>

<body>

  <div class="sigil">
    <div class="sigil-line"></div>
    <div class="sigil-icon">🐆🌴</div>
    <h1 class="event-name">Banquet OBR</h1>
    <p class="event-sub">25 Avril 2026</p>
  </div>

  <div class="rule"></div>

  <div class="invitation-wrap">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <!-- Renomme ton fichier "invitation.jpg" et place-le dans le même dossier -->
    <img src="invitation.jpg" alt="Invitation Banquet OBR" />
  </div>

  <p class="caption">Invitation officielle</p>

  <div class="event-details">
    <div class="detail-row">
      <span class="detail-icon">🗓</span>
      <div class="detail-text">
        <strong>Date</strong>
        Samedi 25 avril 2026 — 18h30 à 02h00
      </div>
    </div>
    <div class="detail-row">
      <span class="detail-icon">📍</span>
      <div class="detail-text">
        <strong>Lieu</strong>
        Pl. des Sciences 1b<br>1348 Ottignies-Louvain-la-Neuve
      </div>
    </div>
  </div>

  <div class="cal-wrap">
    <a class="cal-btn" id="calBtn" href="#" target="_blank" rel="noopener">
      <span class="cal-icon">＋</span>
      <span>Ajouter au calendrier</span>
    </a>
  </div>

  <div class="fb-wrap">
    <a class="fb-btn"
       href="https://fb.me/34XpR0TsYpafo3Z"
       target="_blank"
       rel="noopener">
      <svg class="fb-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 12.073C24 5.404 18.627 0 12 0S0 5.404 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.884v2.25h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
      </svg>
      <span>Voir l'événement Facebook</span>
    </a>
  </div>

  <div class="footer-line"></div>

<script>
  // ── Génération du lien .ics ──────────────────────────────
  // La fin de soirée est le 26/04 à 02h00
  const event = {
    title:    "Banquet OBR 🐆🌴",
    start:    "20260425T163000Z",   // 18h30 CEST = 16h30 UTC
    end:      "20260426T000000Z",   // 02h00 CEST = 00h00 UTC
    location: "Pl. des Sciences 1b, 1348 Ottignies-Louvain-la-Neuve",
    description: "Invitation officielle — Banquet OBR"
  };

  const ics = [
    "BEGIN:VCALENDAR",
    "VERSION:2.0",
    "PRODID:-//Banquet OBR//FR",
    "BEGIN:VEVENT",
    `DTSTART:${event.start}`,
    `DTEND:${event.end}`,
    `SUMMARY:${event.title}`,
    `LOCATION:${event.location}`,
    `DESCRIPTION:${event.description}`,
    "STATUS:CONFIRMED",
    "END:VEVENT",
    "END:VCALENDAR"
  ].join("\r\n");

  const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
  const url  = URL.createObjectURL(blob);
  document.getElementById("calBtn").href = url;
  document.getElementById("calBtn").download = "banquet-obr.ics";
</script>

</body>
</html>
