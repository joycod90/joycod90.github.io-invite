<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Granted</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  background: url('bg.jpg') no-repeat center/cover;
  font-family: 'Montserrat', sans-serif;
  color: #F5E6C8;
  overflow: hidden;
}

/* écran noir */
.black-screen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  z-index: 10;
  transition: opacity 1s ease;
}

/* pulse effect */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  animation: pulse 4s infinite;
}

@keyframes pulse {
  0% { background: rgba(0,0,0,0.6); }
  50% { background: rgba(0,0,0,0.75); }
  100% { background: rgba(0,0,0,0.6); }
}

.container {
  position: relative;
  z-index: 2;
  padding: 20px;
  max-width: 90%;
  opacity: 0;
  transition: opacity 1s ease;
}

h1 {
  font-family: 'Playfair Display', serif;
  letter-spacing: 0.12em;
  font-size: clamp(2rem, 6vw, 3rem);
  opacity: 0;
}

p {
  color: #D6C6A5;
  font-size: clamp(1rem, 3.5vw, 1.3rem);
  margin: 8px 0;
  opacity: 0;
}

/* sprite leopard */
#sprite {
  width: 120px;
  height: 60px;
  background: url('leopard.png') left center / 600% no-repeat;
  margin: 10px auto;
  opacity: 0;
}

/* barre */
#line {
  width: 70vw;
  max-width: 250px;
  height: 3px;
  background: rgba(255,255,255,0.2);
  margin: 20px auto;
  overflow: hidden;
}

#countdown {
  margin-top: 20px;
  font-size: 2rem;
  opacity: 0;
}

#finalText {
  margin-top: 15px;
  font-size: 0.9rem;
  opacity: 0;
  letter-spacing: 0.1em;
}
</style>
</head>

<body>

<div class="black-screen" id="black"></div>
<div class="overlay"></div>

<div class="container" id="container">
  <h1 id="title">ACCESS GRANTED</h1>

  <div id="sprite"></div>

  <p id="text1">You have been chosen.</p>
  <p id="text2">The gates are opening…</p>
  <p id="text3">Stand by.</p>

  <div id="line"></div>
  <div id="countdown">7</div>

  <div id="finalText">Only a few will pass.</div>
</div>

<audio id="jingle" src="jingle.mp3" preload="auto"></audio>

<script>
const black = document.getElementById("black");
const container = document.getElementById("container");
const title = document.getElementById("title");
const sprite = document.getElementById("sprite");
const text1 = document.getElementById("text1");
const text2 = document.getElementById("text2");
const text3 = document.getElementById("text3");
const countdown = document.getElementById("countdown");
const finalText = document.getElementById("finalText");
const audio = document.getElementById("jingle");

let timeLeft = 7;
let frame = 0;
const totalFrames = 6;

// 🎬 TIMELINE

setTimeout(() => black.style.opacity = "0", 500);

setTimeout(() => {
  container.style.opacity = "1";
  title.style.opacity = "1";
}, 1000);

setTimeout(() => {
  sprite.style.opacity = "1";
}, 2000);

setTimeout(() => text1.style.opacity = "1", 2500);
setTimeout(() => text2.style.opacity = "1", 3000);
setTimeout(() => text3.style.opacity = "1", 3500);

setTimeout(() => {
  audio.play().catch(()=>{});
}, 3000);

document.body.addEventListener("touchstart", () => {
  audio.play().catch(()=>{});
}, { once: true });

setTimeout(() => {
  countdown.style.opacity = "1";
  finalText.style.opacity = "1";
}, 3500);

// 🐆 animation sprite synchronisée au temps
setInterval(() => {
  frame = (frame + 1) % totalFrames;
  sprite.style.backgroundPosition = `${-frame * 100}% 0`;
}, 120);

// ⏳ countdown + sync tension
const timer = setInterval(() => {
  countdown.textContent = timeLeft;

  // accélère légèrement animation en fin
  if (timeLeft <= 3) {
    sprite.style.filter = "brightness(1.3)";
  }

  if (timeLeft <= 0) {
    clearInterval(timer);
    window.location.href = "https://drive.google.com/file/d/1YNSWG5gqM5v1o748F2eNL6bNJ0nv5FB8/view?usp=drive_link";
  }

  timeLeft--;
}, 1000);
</script>

</body>
</html>
